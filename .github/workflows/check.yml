name: Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate design tokens
        run: python3 tools/yalla_design.py check

      - name: Unit tests
        run: python3 -m unittest discover -s tools -p 'test_*.py'
